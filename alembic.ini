# A generic, single database configuration.

[alembic]
# path to migration scripts
script_location = backend/data/migrations

# template for migration file names, example: "%(rev)s_%(slug)s.py"
# file_template = %%(rev)s_%%(slug)s

# timezone to use when rendering the date within the migration file
# as well as the filename.
# filename_timezone =

# sys.path path, will be prepended to sys.path if present.
# defaults to None
# prepend_sys_path = .

# timezone to use to generate the timestamp within the migration file
# revision_environment_timezone =

# template for evaluation of 'revision_environment = True' option
# revision_environment_context = {}

# revision_environment = false

# revision_title_max_length = 40

# logging_config_section = logging

# command_output_encoding =

#----------------- MOSS Database Connection Configuration -----------------
# Placeholder URL - the actual URL will be loaded dynamically in env.py
# from the application's settings module. Alembic still requires this line.
sqlalchemy.url = DATABASE_URL_PLACEHOLDER
#--------------------------------------------------------------------------

# Other configuration options...
# revision_order = sequential

[post_write_hooks]
# See documentation for details.
# hooks = black
# black.type = console
# black.entrypoint = black
# black.options = -l 79 %(current_file)s

# hooks = ruff
# ruff.type = console
# ruff.entrypoint = ruff
# ruff.options = --fix %(current_file)s

# --- Logging Configuration Section ---
# Commented out by default.
# [loggers]
# keys = root,sqlalchemy,alembic
#
# [handlers]
# keys = console
#
# [formatters]
# keys = generic
#
# [logger_root]
# level = WARN
# handlers = console
# qualname =
#
# [logger_sqlalchemy]
# level = WARN
# handlers =
# qualname = sqlalchemy.engine
#
# [logger_alembic]
# level = INFO
# handlers =
# qualname = alembic
#
# [handler_console]
# class = StreamHandler
# args = (sys.stderr,)
# level = NOTSET
# formatter = generic
#
# [formatter_generic]
# format = %(levelname)-5.5s [%(name)s] %(message)s
# datefmt = %H:%M:%S